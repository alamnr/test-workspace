#spring.jpa.properties.hibernate.format_sql=true



##to log plain SQL statements without logger properties
#spring.jpa.show-sql=true
##to log SQL statements with logger; with timestamps and threadId
logging.level.org.hibernate.SQL=debug
##to log data mapping to/from SQL queries
logging.level.org.hibernate.orm.jdbc.bind=trace
##logging.level.org.hibernate.type=trace -- legacy property renamed to above

##hibernate schema tooling debug
logging.level.org.hibernate.tool=TRACE

logging.level.info.ejava.examples.common.web=TRACE
logging.level.info.ejava.examples.common.webflux=TRACE
logging.level.org.springframework.web.reactive.function.client=TRACE
